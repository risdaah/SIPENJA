<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPENJA — Riwayat Pekerjaan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://kit.fontawesome.com/e943a573af.js" crossorigin="anonymous"></script>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/app.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div id="spinner">
    <div class="spinner-ring"></div>
  </div>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <img src="img/Any Jaya Logo White.png" alt="Ani Jaya Logo">
        </div>
        <span class="sidebar-brand-name">SIPENJA</span>
      </div>
      <nav class="sidebar-nav">
        <a href="update-progress.html" class="nav-link">
          <i class="fa-solid fa-list-check"></i> Update Progress
        </a>
        <a href="riwayat-pekerjaan.html" class="nav-link active">
          <i class="fa-solid fa-clock-rotate-left"></i> Riwayat Pekerjaan
        </a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar">
        <button class="topbar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="topbar-spacer"></div>
        <a href="edit-profil.html" class="topbar-user" id="topbarUser">
          <div class="topbar-avatar" id="topbarAvatar">—</div>
          <div>
            <div class="topbar-user-name" id="navbar-nama">—</div>
            <div class="topbar-user-role" id="navbar-role">—</div>
          </div>
        </a>
        <button class="btn-logout" onclick="confirmLogout()">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </button>
      </header>
      <div class="page-body">
        <div class="page-header">
          <div>
            <div class="page-title">Riwayat Pekerjaan</div>
            <div class="page-subtitle">Histori pekerjaan servis mekanik</div>
          </div>
        </div>
        <div class="filter-bar">
          <div class="filter-group">
            <label class="filter-label">Status</label>
            <select id="filterDropdown" class="filter-control" onchange="filterData()" style="min-width:150px">
              <option value="">Semua Status</option>
              <option value="Belum">Belum</option>
              <option value="Dalam Proses">Dalam Proses</option>
              <option value="Selesai">Selesai</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label">Dari</label>
            <input type="date" id="filterTanggalMulai" class="filter-control" onchange="filterData()">
          </div>
          <div class="filter-group">
            <label class="filter-label">Sampai</label>
            <input type="date" id="filterTanggalAkhir" class="filter-control" onchange="filterData()">
          </div>
          <div class="filter-group" style="flex:1">
            <label class="filter-label">Cari</label>
            <input type="text" id="searchInput" class="filter-control" placeholder="Kode antrian / pelanggan..."
              style="min-width:200px" onkeyup="if(event.key==='Enter') searchData()">
          </div>
          <div class="filter-actions">
            <button class="btn-filter apply" onclick="searchData()"><i class="fa-solid fa-magnifying-glass"></i>
              Cari</button>
            <button class="btn-filter reset" onclick="resetFilter()"><i class="fa-solid fa-rotate-left"></i>
              Reset</button>
          </div>
        </div>
        <div class="table-card">
          <div class="table-card-header"><span class="table-count" id="table-count"></span></div>
          <div class="table-responsive">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width:46px">No</th>
                  <th>Kode Antrian</th>
                  <th>Pelanggan</th>
                  <th>Layanan</th>
                  <th style="text-align:center">Status</th>
                  <th>Tgl Masuk</th>
                  <th>Tgl Selesai</th>
                  <th style="width:60px;text-align:center">Aksi</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr class="loading-row">
                  <td colspan="8"><span class="spinner-sm"></span> Memuat data...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="pagination-bar">
            <span class="page-info" id="page-info"></span>
            <div id="paginationContainer" class="page-btns"></div>
          </div>
        </div>
      </div>
      <footer class="page-footer">&copy; 2025 SIPENJA &mdash; Bengkel Ani Jaya</footer>
    </div>
  </div>
  <!-- Modal Detail Pekerjaan -->
  <div class="modal fade" id="modalDetail" tabindex="-1" aria-labelledby="modalDetailLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="modalDetailLabel">
            <i class="fa fa-eye me-2 text-info"></i>Detail Pekerjaan
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalDetailBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Tutup</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
  <script src="js/riwayat-pekerjaan.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }
    document.addEventListener('click', function (e) {
      const sb = document.getElementById('sidebar');
      const btn = document.getElementById('sidebarToggle');
      if (sb && btn && !sb.contains(e.target) && !btn.contains(e.target)) {
        sb.classList.remove('open');
      }
    });
  </script>
</body>

</html>
