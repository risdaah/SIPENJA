<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>SIPENJA - Riwayat Pekerjaan</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link href="img/favicon.ico" rel="icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/e943a573af.js" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/riwayat-pekerjaan.css" rel="stylesheet">
</head>

<body>
    <div class="container-xxl position-relative d-flex p-0" style="background:var(--light)">

        <!-- Spinner -->
        <div id="spinner"
            class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
            <div class="spinner-border text-primary" style="width:3rem;height:3rem;" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar pe-4 pb-3">
            <nav class="navbar bg-light navbar-light">
                <a href="update-progress.html" class="navbar-brand mx-4 mb-3">
                    <h3 class="text-primary">SIPENJA</h3>
                </a>
                <div class="navbar-nav w-100">
                    <a href="update-progress.html" class="nav-item nav-link">
                        <i class="fa-solid fa-house me-2"></i>Update Progress
                    </a>
                    <a href="riwayat-pekerjaan.html" class="nav-item nav-link active">
                        <i class="fa-solid fa-clock-rotate-left me-2"></i>Riwayat Pekerjaan
                    </a>
                </div>
            </nav>
        </div>

        <!-- Content -->
        <div class="content">

            <!-- Navbar -->
            <nav class="navbar navbar-expand bg-light navbar-light sticky-top px-4 py-0">
                <a href="update-progress.html" class="navbar-brand d-flex d-lg-none me-4">
                    <h2 class="text-primary mb-0"><i class="fa fa-hashtag"></i></h2>
                </a>
                <a href="#" class="sidebar-toggler flex-shrink-0"><i class="fa fa-bars"></i></a>
                <div class="navbar-nav align-items-center ms-auto">
                    <div class="nav-item me-3 d-none d-sm-flex align-items-center gap-2">
                        <i class="fa-solid fa-circle-user text-primary" style="font-size:1.3rem"></i>
                        <div style="line-height:1.2">
                            <div style="font-size:.82rem;font-weight:600;color:#191C24" id="navbar-nama">—</div>
                            <div style="font-size:.72rem;color:#8e9bb0;text-transform:capitalize" id="navbar-role">—
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="confirmLogout()">
                        <i class="fa-solid fa-right-from-bracket me-1"></i>LOGOUT
                    </button>
                </div>
            </nav>

            <!-- Main Content -->
            <div class="container-fluid pt-4 px-4">
                <div class="bg-light rounded p-4">

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0">
                            <i class="fa-solid fa-clock-rotate-left me-2 text-primary"></i>Riwayat Pekerjaan
                        </h5>
                    </div>

                    <div class="table-responsive rounded">
                        <table class="table table-bordered table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="text-center" style="width:50px">No</th>
                                    <th class="text-center">Kode Antrian</th>
                                    <th>Pelanggan</th>
                                    <th>Layanan</th>
                                    <th class="text-center">Status</th>
                                    <th class="text-center">Tgl Masuk</th>
                                    <th class="text-center">Tgl Selesai</th>
                                    <th class="text-center" style="width:70px">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr>
                                    <td colspan="8" class="text-center py-4 text-muted">
                                        <div class="spinner-border spinner-border-sm text-primary me-2" role="status">
                                        </div>
                    </div>
                    Memuat data...
                    </td>
                    </tr>
                    </tbody>
                    </table>
                </div>

            </div>
        </div>

        <!-- Footer -->
        <div class="container-fluid pt-4 px-4">
            <div class="bg-light rounded-top p-4">
                <div class="row">
                    <div class="col-12 col-sm-6 text-center text-sm-start">
                        &copy; <a href="#">SIPENJA - Bengkel Any Jaya</a>, All Right Reserved.
                    </div>
                    <div class="col-12 col-sm-6 text-center text-sm-end">
                        Designed By <a href="https://htmlcodex.com">HTML Codex</a><br>
                        Distributed By <a class="border-bottom" href="https://themewagon.com"
                            target="_blank">ThemeWagon</a>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <!-- Content End -->

    <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
    </div>

    <!-- Modal Detail Pekerjaan -->
    <div class="modal fade" id="modalDetail" tabindex="-1" aria-labelledby="modalDetailLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalDetailLabel">
                        <i class="fa fa-eye me-2 text-info"></i>Detail Pekerjaan
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalDetailBody">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
    <script src="js/riwayat-pekerjaan.js"></script>
</body>

</html>
