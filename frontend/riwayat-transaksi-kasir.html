<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPENJA — Riwayat Transaksi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://kit.fontawesome.com/e943a573af.js" crossorigin="anonymous"></script>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/app.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* ── Thermal Receipt Style ────────────────────────────── */
    #struk-print-area {
      width: 100%;
      background: #fff;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      color: #111;
      padding: 20px 16px 24px;
      line-height: 1.55;
    }

    .struk-logo {
      text-align: center;
      font-size: 38px;
      margin-bottom: 4px;
    }

    .struk-header {
      text-align: center;
      margin-bottom: 8px;
    }

    .struk-header h5 {
      font-size: 15px;
      font-weight: 700;
      margin: 3px 0 2px;
      font-family: 'Courier New', monospace;
    }

    .struk-header p {
      margin: 1px 0;
      font-size: 12px;
      color: #333;
    }

    .struk-divider {
      border: none;
      border-top: 1px dashed #888;
      margin: 8px 0;
    }

    .struk-info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .struk-info-right {
      text-align: right;
    }

    .struk-no {
      font-size: 12px;
      margin: 4px 0 2px;
    }

    .struk-items {
      margin: 4px 0;
    }

    .struk-item {
      margin-bottom: 7px;
    }

    .struk-item-name {
      font-weight: 700;
      font-size: 13px;
    }

    .struk-item-detail {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding-left: 10px;
      color: #222;
    }

    .struk-total-section {
      margin-top: 4px;
    }

    .struk-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin: 2px 0;
    }

    .struk-total-row.grand {
      font-weight: 700;
      font-size: 14px;
    }

    .struk-footer {
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
      color: #333;
    }

    .struk-footer p {
      margin: 2px 0;
    }

    /* ── Print media ─────────────────────────────────────── */
    @media print {
      body>* {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="spinner">
    <div class="spinner-ring"></div>
  </div>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <img src="img/Any Jaya Logo White.png" alt="Ani Jaya Logo">
        </div>
        <span class="sidebar-brand-name">SIPENJA</span>
      </div>
      <nav class="sidebar-nav">
        <a href="transaksi-kasir.html" class="nav-link"><i class="fa-solid fa-plus-circle"></i> Transaksi Baru</a>
        <a href="sparepart-kasir.html" class="nav-link"><i class="fa-solid fa-gear"></i> Sparepart</a>
        <a href="layanan-servis-kasir.html" class="nav-link"><i class="fa-solid fa-wrench"></i> Layanan Servis</a>
        <a href="perbarui-transaksi-kasir.html" class="nav-link"><i class="fa-solid fa-pen-to-square"></i> Perbarui
          Transaksi</a>
        <a href="riwayat-transaksi-kasir.html" class="nav-link active"><i class="fa-solid fa-clock-rotate-left"></i>
          Riwayat Transaksi</a>
      </nav>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="topbar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="topbar-spacer"></div>
        <a href="edit-profil.html" class="topbar-user" id="topbarUser">
          <div class="topbar-avatar" id="topbarAvatar">—</div>
          <div>
            <div class="topbar-user-name" id="navbar-nama">—</div>
            <div class="topbar-user-role" id="navbar-role">—</div>
          </div>
        </a>
        <button class="btn-logout" onclick="confirmLogout()">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </button>
      </header>

      <div class="page-body">
        <div class="page-header">
          <div>
            <div class="page-title">Riwayat Transaksi</div>
            <div class="page-subtitle">Histori transaksi kasir</div>
          </div>
        </div>

        <div class="filter-bar">
          <div class="filter-group">
            <label class="filter-label">Jenis</label>
            <select id="filterJenis" class="filter-control" onchange="filterData()" style="min-width:150px">
              <option value="">Semua Jenis</option>
              <option value="SERVIS">Servis Kendaraan</option>
              <option value="PEMBELIAN">Pembelian Sparepart</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label">Dari</label>
            <input type="date" id="filterTanggalMulai" class="filter-control" onchange="filterData()">
          </div>
          <div class="filter-group">
            <label class="filter-label">Sampai</label>
            <input type="date" id="filterTanggalAkhir" class="filter-control" onchange="filterData()">
          </div>
          <div class="filter-group" style="flex:1">
            <label class="filter-label">Cari</label>
            <input type="text" id="searchInput" class="filter-control" placeholder="No. transaksi / kasir..."
              style="min-width:200px" onkeyup="if(event.key==='Enter') searchData()">
          </div>
          <div class="filter-actions">
            <button class="btn-filter apply" onclick="searchData()"><i class="fa-solid fa-magnifying-glass"></i>
              Cari</button>
            <button class="btn-filter reset" onclick="resetFilter()"><i class="fa-solid fa-rotate-left"></i>
              Reset</button>
          </div>
        </div>

        <div class="table-card">
          <div class="table-card-header"><span class="table-count" id="table-count"></span></div>
          <div class="table-responsive">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width:46px">No</th>
                  <th>No. Transaksi</th>
                  <th>Tanggal</th>
                  <th style="width:110px">Jenis</th>
                  <th style="text-align:right">Total</th>
                  <th>Kasir</th>
                  <th>Catatan</th>
                  <th style="width:90px;text-align:center">Aksi</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr class="loading-row">
                  <td colspan="8"><span class="spinner-sm"></span> Memuat data...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="pagination-bar">
            <span class="page-info" id="page-info"></span>
            <div id="paginationContainer" class="page-btns"></div>
          </div>
        </div>
      </div>

      <footer class="page-footer">&copy; 2025 SIPENJA &mdash; Bengkel Ani Jaya</footer>
    </div>
  </div>

  <!-- No HP row -->
  <div style="padding:12px 18px; border-bottom:1px solid #F1F5F9; flex-shrink:0; background:#F8FAFC;">
    <label style="font-size:12px;font-weight:600;color:#64748B;display:block;margin-bottom:5px">
      <i class="fab fa-whatsapp text-success me-1"></i>No. HP Pelanggan
      <span id="struk-nohp-saved" style="display:none;font-weight:400;color:#94A3B8"></span>
    </label>
    <div style="display:flex;gap:6px">
      <input type="tel" id="struk-nohp-input" placeholder="08123456789" maxlength="15" oninput="onNohpInput()"
        style="flex:1;height:32px;border:1px solid #E2E8F0;border-radius:6px;padding:0 10px;font-size:13px;font-family:inherit;outline:none">
      <button onclick="simpanNohpStruk()" id="btn-simpan-nohp"
        style="padding:0 14px;height:32px;background:#0070F3;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">
        Simpan
      </button>
    </div>
    <div id="struk-nohp-feedback" style="font-size:11px;color:#E53E3E;margin-top:4px;display:none"></div>
  </div>

  <!-- Preview area (scrollable) -->
  <div style="overflow-y:auto; flex:1; padding:4px 0;">
    <div id="struk-print-area">
      <div style="text-align:center;padding:40px">
        <div class="spinner-sm"></div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="struk-popup-actions" style="
      display:flex; gap:8px; flex-wrap:wrap; padding:12px 16px;
      border-top:1px solid #E2E8F0; flex-shrink:0; justify-content:flex-end;">
    <button onclick="tutupStrukPopup()"
      style="padding:6px 14px;border:1px solid #E2E8F0;background:#fff;color:#64748B;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer">
      Tutup
    </button>
    <button id="btn-kirim-wa" onclick="kirimWAStruk()" disabled
      style="padding:6px 14px;background:#25D366;color:#fff;border:none;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px">
      <i class="fab fa-whatsapp"></i> Kirim WA
    </button>
    <button id="btn-download-img" onclick="downloadStrukGambar()"
      style="padding:6px 14px;background:#F59E0B;color:#fff;border:none;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px">
      <i class="fa-solid fa-image"></i> Gambar
    </button>
    <button id="btn-download-pdf" onclick="downloadStrukPdf()"
      style="padding:6px 14px;background:#E53E3E;color:#fff;border:none;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px">
      <i class="fa-solid fa-file-pdf"></i> PDF
    </button>
  </div>
  </div>
  </div>

  <!-- Modal Detail -->
  <div class="modal fade" id="modalDetail" tabindex="-1" aria-labelledby="modalDetailLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="modalDetailLabel">Detail Transaksi</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="modalDetailBody">
          <div class="text-center py-4">
            <div class="spinner-border text-primary" role="status"></div>
          </div>
        </div>
        <div class="modal-footer" id="modalDetailFooter">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Tutup</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Struk Aksi -->
  <div class="modal fade" id="modalStruk" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width:380px">
      <div class="modal-content">
        <div class="modal-header py-2">
          <h6 class="modal-title fw-bold" id="modalStrukLabel">
            <i class="fa fa-receipt me-2 text-primary"></i>Struk Transaksi
          </h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body py-3">

          <!-- Loading -->
          <div id="struk-loading" style="text-align:center;padding:20px 0">
            <span class="spinner-sm"></span> Memuat data struk...
          </div>

          <!-- Error -->
          <div id="struk-error" style="display:none;color:#E53E3E;font-size:13px;padding:8px 0">
            <i class="fa fa-circle-exclamation me-1"></i>
          </div>

          <!-- No HP -->
          <div id="struk-nohp-wrap" style="margin-bottom:12px">
            <label style="font-size:12px;font-weight:600;color:#64748B;display:block;margin-bottom:5px">
              <i class="fab fa-whatsapp text-success me-1"></i>No. HP Pelanggan
              <span id="struk-nohp-saved" style="display:none;font-weight:400;color:#94A3B8"></span>
            </label>
            <div style="display:flex;gap:6px">
              <input type="tel" id="struk-nohp-input" placeholder="08123456789" maxlength="15" oninput="onNohpInput()"
                style="flex:1;height:32px;border:1px solid #E2E8F0;border-radius:6px;padding:0 10px;font-size:13px;font-family:inherit;outline:none">
              <button onclick="simpanNohpStruk()" id="btn-simpan-nohp"
                style="padding:0 14px;height:32px;background:#0070F3;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">
                Simpan
              </button>
            </div>
            <div id="struk-nohp-feedback" style="font-size:11px;color:#E53E3E;margin-top:4px;display:none"></div>
          </div>

          <!-- Action buttons -->
          <div id="struk-action-btns" style="display:none;flex-direction:column;gap:8px">
            <button onclick="downloadStrukGambar()" id="btn-download-img"
              style="width:100%;padding:9px;background:#F59E0B;color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
              <i class="fa-solid fa-image"></i> Download Gambar (.png)
            </button>
            <button onclick="downloadStrukPdf()" id="btn-download-pdf"
              style="width:100%;padding:9px;background:#E53E3E;color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
              <i class="fa-solid fa-print"></i> Cetak / PDF
            </button>
            <button onclick="kirimWAStruk()" id="btn-kirim-wa"
              style="width:100%;padding:9px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
              <i class="fab fa-whatsapp"></i> Kirim ke WhatsApp
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
  <script src="js/riwayat-transaksi-kasir.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }
    document.addEventListener('click', function (e) {
      const sb = document.getElementById('sidebar');
      const btn = document.getElementById('sidebarToggle');
      if (sb && btn && !sb.contains(e.target) && !btn.contains(e.target)) {
        sb.classList.remove('open');
      }
    });
  </script>
</body>

</html>
