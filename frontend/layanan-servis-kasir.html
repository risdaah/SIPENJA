<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPENJA — Layanan Servis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://kit.fontawesome.com/e943a573af.js" crossorigin="anonymous"></script>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/app.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div id="spinner">
    <div class="spinner-ring"></div>
  </div>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <img src="img/Any Jaya Logo White.png" alt="Ani Jaya Logo">
        </div>
        <span class="sidebar-brand-name">SIPENJA</span>
      </div>
      <nav class="sidebar-nav">
        <a href="transaksi-kasir.html" class="nav-link">
          <i class="fa-solid fa-plus-circle"></i> Transaksi Baru
        </a>
        <a href="sparepart-kasir.html" class="nav-link">
          <i class="fa-solid fa-gear"></i> Sparepart
        </a>
        <a href="layanan-servis-kasir.html" class="nav-link active">
          <i class="fa-solid fa-wrench"></i> Layanan Servis
        </a>
        <a href="perbarui-transaksi-kasir.html" class="nav-link">
          <i class="fa-solid fa-pen-to-square"></i> Perbarui Transaksi
        </a>
        <a href="riwayat-transaksi-kasir.html" class="nav-link">
          <i class="fa-solid fa-clock-rotate-left"></i> Riwayat Transaksi
        </a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar">
        <button class="topbar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="topbar-spacer"></div>
        <a href="edit-profil.html" class="topbar-user" id="topbarUser">
          <div class="topbar-avatar" id="topbarAvatar">—</div>
          <div>
            <div class="topbar-user-name" id="navbar-nama">—</div>
            <div class="topbar-user-role" id="navbar-role">—</div>
          </div>
        </a>
        <button class="btn-logout" onclick="confirmLogout()">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </button>
      </header>
      <div class="page-body">
        <div class="page-header">
          <div>
            <div class="page-title">Data Layanan Servis</div>
            <div class="page-subtitle">Daftar layanan servis yang tersedia</div>
          </div>
        </div>
        <div class="filter-bar">
          <div class="filter-group" style="flex:1">
            <label class="filter-label">Cari</label>
            <input type="text" id="searchInput" class="filter-control" placeholder="Cari kode / nama layanan..."
              style="min-width:220px">
          </div>
          <div class="filter-actions">
            <button class="btn-filter apply" onclick="searchData()"><i class="fa-solid fa-magnifying-glass"></i>
              Cari</button>
          </div>
        </div>
        <div class="table-card">
          <div class="table-card-header"><span class="table-count" id="table-count"></span></div>
          <div class="table-responsive">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width:46px">No</th>
                  <th>Kode Layanan</th>
                  <th>Nama Layanan</th>
                  <th style="text-align:right">Biaya Pokok</th>
                  <th>Deskripsi</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr class="loading-row">
                  <td colspan="5"><span class="spinner-sm"></span> Memuat data...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="pagination-bar">
            <span class="page-info" id="page-info"></span>
            <div id="paginationContainer" class="page-btns"></div>
          </div>
        </div>
      </div>
      <footer class="page-footer">&copy; 2025 SIPENJA &mdash; Bengkel Ani Jaya</footer>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
  <script src="js/layanan-servis-kasir.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }
    document.addEventListener('click', function (e) {
      const sb = document.getElementById('sidebar');
      const btn = document.getElementById('sidebarToggle');
      if (sb && btn && !sb.contains(e.target) && !btn.contains(e.target)) {
        sb.classList.remove('open');
      }
    });
  </script>
</body>

</html>
