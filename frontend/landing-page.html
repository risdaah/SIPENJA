<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIPENJA - Bengkel Ani Jaya</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../frontend/css/landing-page.css" />

</head>

<body>

    <!-- ========================
       NAVBAR
  ======================== -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid px-4">
            <img src="../frontend/img/logo-anijaya.jpeg" alt="SIPENJA" height="40" />
            <a href="login.html" class="btn btn-login">LOGIN</a>
        </div>
    </nav>

    <!-- ========================
       HERO SECTION
  ======================== -->
    <section class="hero-section">
        <div class="container">
            <div class="row align-items-center g-5">

                <!-- Left: Text -->
                <div class="col-lg-5">
                    <h1 class="hero-title">Bengkel Ani Jaya</h1>
                    <p class="hero-desc">
                        Sistem informasi pengelolaan bengkel motor yang mudah, cepat, dan terintegrasi.
                        Kelola servis, sparepart, dan transaksi dalam satu platform.
                    </p>
                    <a href="../frontend/page-admin/dashboard-admin.html" class="btn-cek-antrian">
                        <i class="bi bi-search"></i>
                        Cek Status Antrian Servis
                    </a>
                </div>

                <!-- Right: Browser Mockup -->
                <div class="col-lg-7">
                    <div class="browser-mockup">
                        <div class="browser-header">
                            <div class="browser-dots">
                                <span class="browser-dot dot-red"></span>
                                <span class="browser-dot dot-yellow"></span>
                                <span class="browser-dot dot-green"></span>
                            </div>
                            <div class="browser-nav">
                                <i class="bi bi-chevron-left"></i>
                                <i class="bi bi-chevron-right"></i>
                            </div>
                        </div>
                        <div class="browser-content">
                            <div class="mockup-inner">
                                <div class="mockup-shape-1"></div>
                                <div class="mockup-shape-2"></div>
                                <div class="mockup-shape-3"></div>
                                <div class="mockup-shape-4"></div>
                                <div class="mockup-play">
                                    <i class="bi bi-play-fill"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- ========================
       FOOTER
  ======================== -->
    <footer>
        <div class="container">
            <div class="footer-top">
                <div class="footer-logo">SIPENJA</div>
            </div>
            <hr class="footer-divider" />
            <div class="footer-bottom">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <p class="footer-copy">© Copyright Bengkel Ani Jaya, All Rights Reserved.</p>
                    </div>
                    <div class="col-md-6">
                        <div class="footer-links">
                            <a href="#">Terms & Conditions</a>
                            <a href="#">Privacy Policy</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="../frontend/js/landing-page.js"></script>

</body>

</html>
