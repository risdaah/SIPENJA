<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <title>SIPENJA - Registrasi Admin</title>
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://kit.fontawesome.com/e943a573af.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-page: #f4f6fa;
      --bg-card: #ffffff;
      --bg-input: #f8f9fc;
      --border: #dde1eb;
      --border-focus: #4f6ef7;
      --accent: #4f6ef7;
      --accent-glow: rgba(79, 110, 247, .15);
      --accent-hover: #3a58e0;
      --text-primary: #1a1d2e;
      --text-muted: #8b93ad;
      --text-label: #4a5068;
      --error: #e03b3b;
      --error-bg: #fef2f2;
      --success: #1a9e5e;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --font: 'Plus Jakarta Sans', sans-serif;
      --shadow-card: 0 4px 24px rgba(79, 110, 247, .08), 0 1px 4px rgba(0, 0, 0, .06);
    }

    html,
    body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--text-primary);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79, 110, 247, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 110, 247, .035) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Spinner ── */
    #spinner {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-page);
      z-index: 9999;
      transition: opacity .3s ease;
    }

    #spinner.hide {
      opacity: 0;
      pointer-events: none;
    }

    .spinner-ring {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* ── Wrapper ── */
    .register-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* ── Card ── */
    .register-card {
      width: 100%;
      max-width: 860px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 44px 36px;
      box-shadow: var(--shadow-card);
      animation: fadeUp .45s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Logo ── */
    .card-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo-img {
      height: 48px;
      object-fit: contain;
    }

    .logo-fallback {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-fallback .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      color: #fff;
    }

    .logo-fallback span {
      font-weight: 800;
      font-size: 21px;
      color: var(--text-primary);
    }

    /* ── Header ── */
    .card-header {
      text-align: center;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 21px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .card-sub {
      font-size: 13.5px;
      color: var(--text-muted);
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #eef1fe;
      border: 1px solid #c7d1fb;
      color: #4f6ef7;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 100px;
      margin-top: 8px;
    }

    /* ── Alert ── */
    .alert-error {
      background: var(--error-bg);
      border: 1px solid #fca5a5;
      border-radius: var(--radius-sm);
      color: var(--error);
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .alert-error i {
      margin-top: 1px;
      flex-shrink: 0;
    }

    /* ── Two-column layout ── */
    .form-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      align-items: start;
    }

    .form-col {
      padding: 0 18px;
    }

    .form-col:first-child {
      padding-left: 0;
      border-right: 1px solid var(--border);
      padding-right: 32px;
    }

    .form-col:last-child {
      padding-right: 0;
      padding-left: 32px;
    }

    .col-heading {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .col-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Field ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 13px;
    }

    .field label {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-label);
    }

    .field label .req {
      color: var(--accent);
      margin-left: 2px;
    }

    .input-group-custom {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      transition: border-color .2s, box-shadow .2s;
    }

    .input-group-custom:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: #fff;
    }

    .input-group-custom.error-field {
      border-color: var(--error);
    }

    .input-group-custom.error-field:focus-within {
      box-shadow: 0 0 0 3px rgba(224, 59, 59, .12);
    }

    .input-icon {
      width: 38px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 13px;
    }

    .input-group-custom input,
    .input-group-custom select {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13.5px;
      padding: 10px 10px 10px 0;
    }

    .input-group-custom select {
      cursor: pointer;
    }

    .input-group-custom select option {
      background: #fff;
      color: var(--text-primary);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: opacity(.4);
      cursor: pointer;
    }

    .toggle-password {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 0 11px;
      font-size: 13px;
      transition: color .2s;
    }

    .toggle-password:hover {
      color: var(--text-primary);
    }

    /* ── Strength bar ── */
    .strength-wrap {
      margin-top: 5px;
    }

    .strength-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .strength-bar-fill {
      height: 100%;
      width: 0;
      border-radius: 99px;
      transition: width .35s ease, background .35s ease;
    }

    .strength-text {
      font-size: 11.5px;
      margin-top: 3px;
      color: var(--text-muted);
    }

    /* ── Password rules ── */
    .pw-rules {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 8px;
      margin-top: 9px;
    }

    .pw-rule {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      color: var(--text-muted);
      transition: color .2s;
    }

    .pw-rule i {
      font-size: 10.5px;
    }

    .pw-rule.ok {
      color: var(--success);
    }

    .pw-rule.ok i {
      color: var(--success);
    }

    .pw-rule.fail i {
      color: var(--error);
    }

    /* ── Form bottom ── */
    .form-bottom {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn-register {
      width: 100%;
      padding: 13px 20px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(79, 110, 247, .3);
    }

    .btn-register:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 6px 20px rgba(79, 110, 247, .4);
      transform: translateY(-1px);
    }

    .btn-register:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-register:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    .spinner-ring-sm {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color .2s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .card-footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .register-card {
        padding: 28px 18px 24px;
      }

      .form-columns {
        grid-template-columns: 1fr;
      }

      .form-col:first-child {
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding-right: 0;
        padding-bottom: 20px;
        margin-bottom: 20px;
      }

      .form-col:last-child {
        padding-left: 0;
      }

      .pw-rules {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- Spinner -->
  <div id="spinner">
    <div class="spinner-ring"></div>
  </div>

  <div class="register-wrapper">
    <div class="register-card">

      <!-- Logo -->
      <div class="card-logo">
        <img src="img/Any-Jaya Logo Blue.png" alt="SIPENJA Logo" class="logo-img"
          onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex'">
        <div class="logo-fallback" id="logoFallback" style="display:none">
          <div class="logo-icon">🔧</div>
          <span>SIPENJA</span>
        </div>
      </div>

      <!-- Header -->
      <div class="card-header">
        <h2 class="card-title">Buat Akun Admin</h2>
        <p class="card-sub">Lengkapi data berikut untuk mendaftarkan administrator baru</p>
        <div class="role-badge"><i class="fas fa-shield-halved"></i> Role: Administrator</div>
      </div>

      <!-- Alert error -->
      <div id="alertError" class="alert-error" style="display:none">
        <i class="fas fa-circle-exclamation"></i>
        <span id="alertMsg"></span>
      </div>

      <!-- Form: 2 kolom -->
      <div class="form-columns">

        <!-- Kolom Kiri: Data Diri -->
        <div class="form-col">
          <div class="col-heading">Data Diri</div>

          <div class="field">
            <label for="inputNama">Nama Lengkap <span class="req">*</span></label>
            <div class="input-group-custom" id="wrapNama">
              <span class="input-icon"><i class="fas fa-id-card"></i></span>
              <input type="text" id="inputNama" placeholder="Contoh: Budi Santoso" maxlength="100">
            </div>
          </div>

          <div class="field">
            <label for="inputJK">Jenis Kelamin</label>
            <div class="input-group-custom" id="wrapJK">
              <span class="input-icon"><i class="fas fa-venus-mars"></i></span>
              <select id="inputJK">
                <option value="">— Pilih —</option>
                <option value="L">Laki-laki</option>
                <option value="P">Perempuan</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="inputTTL">Tanggal Lahir</label>
            <div class="input-group-custom" id="wrapTTL">
              <span class="input-icon"><i class="fas fa-calendar"></i></span>
              <input type="date" id="inputTTL" max="">
            </div>
          </div>

          <div class="field">
            <label for="inputUsername">Username <span class="req">*</span></label>
            <div class="input-group-custom" id="wrapUsername">
              <span class="input-icon"><i class="fas fa-user"></i></span>
              <input type="text" id="inputUsername" placeholder="username" maxlength="50" autocomplete="username">
            </div>
          </div>
        </div>

        <!-- Kolom Kanan: Keamanan -->
        <div class="form-col">
          <div class="col-heading">Keamanan</div>

          <!-- Password -->
          <div class="field">
            <label for="inputPassword">Password <span class="req">*</span></label>
            <div class="input-group-custom" id="wrapPassword">
              <span class="input-icon"><i class="fas fa-lock"></i></span>
              <input type="password" id="inputPassword" placeholder="Min. 8 karakter" maxlength="100"
                autocomplete="new-password">
              <button class="toggle-password" type="button" id="togglePass" aria-label="Tampilkan password">
                <i class="fas fa-eye" id="pwIcon"></i>
              </button>
            </div>
            <div class="strength-wrap" id="strengthWrap" style="display:none">
              <div class="strength-bar-track">
                <div class="strength-bar-fill" id="strengthFill"></div>
              </div>
              <div class="strength-text" id="strengthText"></div>
            </div>
            <div class="pw-rules">
              <div class="pw-rule" id="ruleLen"><i class="fas fa-circle-xmark"></i> Min. 8 karakter</div>
              <div class="pw-rule" id="ruleNum"><i class="fas fa-circle-xmark"></i> Mengandung angka</div>
              <div class="pw-rule" id="ruleLetter"><i class="fas fa-circle-xmark"></i> Mengandung huruf</div>
              <div class="pw-rule" id="ruleMatch"><i class="fas fa-circle-xmark"></i> Bukan sama username</div>
            </div>
          </div>

          <!-- Konfirmasi Password -->
          <div class="field">
            <label for="inputConfirm">Konfirmasi Password <span class="req">*</span></label>
            <div class="input-group-custom" id="wrapConfirm">
              <span class="input-icon"><i class="fas fa-lock"></i></span>
              <input type="password" id="inputConfirm" placeholder="Ulangi password" maxlength="100"
                autocomplete="new-password">
              <button class="toggle-password" type="button" id="toggleConfirm" aria-label="Tampilkan konfirmasi">
                <i class="fas fa-eye" id="confirmIcon"></i>
              </button>
            </div>
          </div>
        </div>

      </div><!-- end .form-columns -->

      <!-- Tombol & Footer -->
      <div class="form-bottom">
        <button type="button" class="btn-register" id="btnRegister">
          <span id="btnText">Daftarkan Admin</span>
          <span id="btnSpinner" style="display:none"><span class="spinner-ring-sm"></span></span>
          <i class="fas fa-user-shield" id="btnIcon"></i>
        </button>
        <a href="login.html" class="back-link">
          <i class="fas fa-arrow-left"></i> Kembali ke halaman login
        </a>
      </div>

      <p class="card-footer-text">SIPENJA &mdash; Bengkel Any Jaya</p>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';

    window.addEventListener('load', () => {
      const sp = document.getElementById('spinner');
      setTimeout(() => sp.classList.add('hide'), 200);
    });

    document.getElementById('inputTTL').max = new Date().toISOString().split('T')[0];

    function setupToggle(btnId, inputId, iconId) {
      document.getElementById(btnId).addEventListener('click', () => {
        const inp = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        icon.className = show ? 'fas fa-eye-slash' : 'fas fa-eye';
      });
    }
    setupToggle('togglePass', 'inputPassword', 'pwIcon');
    setupToggle('toggleConfirm', 'inputConfirm', 'confirmIcon');

    const strengthColors = ['#e03b3b', '#f7a25f', '#d4a017', '#1a9e5e', '#1a9e5e'];
    const strengthLabels = ['Sangat Lemah', 'Lemah', 'Cukup', 'Kuat', 'Sangat Kuat'];

    function updateStrength(pw) {
      const wrap = document.getElementById('strengthWrap');
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      if (!pw) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'block';
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      score = Math.min(score, 4);
      fill.style.width = `${(score + 1) * 20}%`;
      fill.style.background = strengthColors[score];
      text.textContent = strengthLabels[score];
      text.style.color = strengthColors[score];
    }

    function updateRules(pw, username) {
      function setRule(id, ok) {
        const el = document.getElementById(id);
        el.classList.toggle('ok', ok);
        el.classList.toggle('fail', pw.length > 0 && !ok);
        el.querySelector('i').className = ok ? 'fas fa-circle-check' : 'fas fa-circle-xmark';
      }
      setRule('ruleLen', pw.length >= 8);
      setRule('ruleNum', /[0-9]/.test(pw));
      setRule('ruleLetter', /[A-Za-z]/.test(pw));
      setRule('ruleMatch', pw.length > 0 && (!username || pw.toLowerCase() !== username.toLowerCase()));
    }

    document.getElementById('inputPassword').addEventListener('input', function () {
      const username = document.getElementById('inputUsername').value.trim();
      updateStrength(this.value);
      updateRules(this.value, username);
    });

    document.getElementById('inputUsername').addEventListener('input', function () {
      const pw = document.getElementById('inputPassword').value;
      if (pw) updateRules(pw, this.value.trim());
    });

    function showAlert(msg) {
      const box = document.getElementById('alertError');
      document.getElementById('alertMsg').textContent = msg;
      box.style.display = 'flex';
      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideAlert() {
      document.getElementById('alertError').style.display = 'none';
    }

    function setFieldError(wrapId, isError) {
      document.getElementById(wrapId).classList.toggle('error-field', isError);
    }

    function validate() {
      const nama = document.getElementById('inputNama').value.trim();
      const username = document.getElementById('inputUsername').value.trim();
      const pw = document.getElementById('inputPassword').value;
      const confirm = document.getElementById('inputConfirm').value;

      ['wrapNama', 'wrapUsername', 'wrapPassword', 'wrapConfirm'].forEach(id => setFieldError(id, false));

      if (!nama) { setFieldError('wrapNama', true); showAlert('Nama lengkap wajib diisi.'); return false; }
      if (!username) { setFieldError('wrapUsername', true); showAlert('Username wajib diisi.'); return false; }
      if (!pw || pw.length < 8) { setFieldError('wrapPassword', true); showAlert('Password minimal 8 karakter.'); return false; }
      if (!/[A-Za-z]/.test(pw)) { setFieldError('wrapPassword', true); showAlert('Password harus mengandung huruf.'); return false; }
      if (!/[0-9]/.test(pw)) { setFieldError('wrapPassword', true); showAlert('Password harus mengandung angka.'); return false; }
      if (pw.toLowerCase() === username.toLowerCase()) { setFieldError('wrapPassword', true); showAlert('Password tidak boleh sama dengan username.'); return false; }
      if (pw !== confirm) { setFieldError('wrapConfirm', true); showAlert('Konfirmasi password tidak cocok.'); return false; }
      return true;
    }

    function setLoading(on) {
      const btn = document.getElementById('btnRegister');
      document.getElementById('btnText').textContent = on ? 'Memproses...' : 'Daftarkan Admin';
      document.getElementById('btnSpinner').style.display = on ? 'inline-flex' : 'none';
      document.getElementById('btnIcon').style.display = on ? 'none' : '';
      btn.disabled = on;
    }

    document.getElementById('btnRegister').addEventListener('click', async () => {
      hideAlert();
      if (!validate()) return;

      const payload = {
        NAMA: document.getElementById('inputNama').value.trim(),
        USERNAME: document.getElementById('inputUsername').value.trim(),
        PASSWORD: document.getElementById('inputPassword').value,
        TANGGALLAHIR: document.getElementById('inputTTL').value || null,
        JENISKELAMIN: document.getElementById('inputJK').value || null,
      };

      setLoading(true);
      try {
        const token = localStorage.getItem('token') || '';
        const res = await fetch(`${API_BASE}/publik/create-admin`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });

        const data = await res.json();

        if (data.success) {
          Swal.fire({
            title: 'Berhasil!',
            text: `Akun admin "${payload.USERNAME}" berhasil dibuat.`,
            icon: 'success',
            background: '#ffffff',
            color: '#1a1d2e',
            confirmButtonColor: '#4f6ef7',
            confirmButtonText: 'OK',
          }).then(() => {
            window.location.href = 'login.html';
          });
        } else {
          showAlert(data.message || 'Gagal membuat akun admin.');
        }
      } catch (err) {
        showAlert('Koneksi ke server gagal. Coba lagi.');
      } finally {
        setLoading(false);
      }
    });

    document.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btnRegister').click();
      });
    });
  </script>
</body>

</html>
