<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPENJA — Kategori Sparepart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://kit.fontawesome.com/e943a573af.js" crossorigin="anonymous"></script>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/app.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
  <div id="spinner">
    <div class="spinner-ring"></div>
  </div>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">
          <img src="img/Any Jaya Logo White.png" alt="Ani Jaya Logo">
        </div>
        <span class="sidebar-brand-name">SIPENJA</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard-admin.html" class="nav-link">
          <i class="fa-solid fa-gauge-high"></i> Dashboard
        </a>
        <a href="kategori-sparepart.html" class="nav-link active">
          <i class="fa-solid fa-tags"></i> Kategori Sparepart
        </a>
        <a href="sparepart.html" class="nav-link">
          <i class="fa-solid fa-gear"></i> Sparepart
        </a>
        <a href="layanan-servis.html" class="nav-link">
          <i class="fa-solid fa-wrench"></i> Layanan Servis
        </a>
        <a href="supplier.html" class="nav-link">
          <i class="fa-solid fa-truck"></i> Supplier
        </a>
        <a href="laporan.html" class="nav-link">
          <i class="fa-solid fa-chart-bar"></i> Laporan
        </a>
        <a href="transaksi.html" class="nav-link">
          <i class="fa-solid fa-receipt"></i> Transaksi
        </a>
        <a href="karyawan.html" class="nav-link">
          <i class="fa-solid fa-users"></i> Karyawan
        </a>
      </nav>
    </aside>
    <div class="main">
      <header class="topbar">
        <button class="topbar-toggle" id="sidebarToggle" onclick="toggleSidebar()">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="topbar-spacer"></div>
        <a href="edit-profil.html" class="topbar-user" id="topbarUser">
          <div class="topbar-avatar" id="topbarAvatar">—</div>
          <div>
            <div class="topbar-user-name" id="navbar-nama">—</div>
            <div class="topbar-user-role" id="navbar-role">—</div>
          </div>
        </a>
        <button class="btn-logout" onclick="confirmLogout()">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </button>
      </header>
      <div class="page-body">
        <div class="page-header">
          <div>
            <div class="page-title">Kategori Sparepart</div>
            <div class="page-subtitle">Data kategori sparepart bengkel</div>
          </div>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalTambah">
            <i class="fa-solid fa-plus"></i> Tambah Kategori
          </button>
        </div>
        <div class="filter-bar">
          <div class="filter-group" style="flex:1">
            <label class="filter-label">Cari</label>
            <input type="text" id="searchInput" class="filter-control" placeholder="Cari kategori / kode..."
              style="min-width:220px">
          </div>
          <div class="filter-actions">
            <button class="btn-filter apply" onclick="searchData()"><i class="fa-solid fa-magnifying-glass"></i>
              Cari</button>
          </div>
        </div>
        <div class="table-card">
          <div class="table-card-header"><span class="table-count" id="table-count"></span></div>
          <div class="table-responsive">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width:46px">No</th>
                  <th>Kategori</th>
                  <th>Kode</th>
                  <th style="width:100px;text-align:center">Aksi</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr class="loading-row">
                  <td colspan="4"><span class="spinner-sm"></span> Memuat data...</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="pagination-bar">
            <span class="page-info" id="page-info"></span>
            <div id="paginationContainer" class="page-btns"></div>
          </div>
        </div>
      </div>
      <footer class="page-footer">&copy; 2025 SIPENJA &mdash; Bengkel Ani Jaya</footer>
    </div>
  </div>
  <!-- Modal Tambah Kategori -->
  <div class="modal fade" id="modalTambah" tabindex="-1" aria-labelledby="modalTambahLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTambahLabel">Tambah Kategori Sparepart</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nama Kategori</label>
            <input type="text" class="form-control" id="inputNamaKategori" placeholder="Contoh: Oli">
          </div>
          <div class="mb-3">
            <label class="form-label">Kode Kategori</label>
            <input type="text" class="form-control" id="inputKodeKategori" placeholder="Contoh: OL" maxlength="10">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn btn-primary btn-sm" onclick="simpanKategori()">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Edit Kategori -->
  <div class="modal fade" id="modalEdit" tabindex="-1" aria-labelledby="modalEditLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalEditLabel">Edit Kategori Sparepart</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editId">
          <div class="mb-3">
            <label class="form-label">Nama Kategori</label>
            <input type="text" class="form-control" id="editNamaKategori">
          </div>
          <div class="mb-3">
            <label class="form-label">Kode Kategori</label>
            <input type="text" class="form-control" id="editKodeKategori" maxlength="10">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn btn-warning btn-sm" onclick="updateKategori()">Update</button>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript Libraries -->
  <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>
  <script src="js/kategori-sparepart.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }
    document.addEventListener('click', function (e) {
      const sb = document.getElementById('sidebar');
      const btn = document.getElementById('sidebarToggle');
      if (sb && btn && !sb.contains(e.target) && !btn.contains(e.target)) {
        sb.classList.remove('open');
      }
    });
  </script>
</body>

</html>
