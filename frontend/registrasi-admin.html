<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>SIPENJA - Registrasi Admin</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="css/registrasi-admin.css" rel="stylesheet">
</head>

<body>

    <!-- Spinner -->
    <div id="spinner">
        <div class="spinner-ring"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card" style="max-width:520px">

            <!-- Logo -->
            <div class="card-logo">
                <i class="fas fa-tools"></i>
            </div>

            <!-- Header -->
            <div class="card-header">
                <p class="card-sub">Buat akun administrator baru</p>
                <h2 class="card-title">Registrasi Admin</h2>
            </div>

            <!-- Alert error -->
            <div id="alert-error" class="alert-error" style="display:none"></div>

            <!-- Form -->
            <div class="form-body">

                <!-- Nama -->
                <div>
                    <label class="field-label">Nama Lengkap</label>
                    <div class="input-group-custom" id="wrap-nama">
                        <span class="input-icon"><i class="fas fa-id-card"></i></span>
                        <input type="text" id="inputNama" placeholder="Nama lengkap" maxlength="100">
                    </div>
                </div>

                <!-- Username -->
                <div>
                    <label class="field-label">Username</label>
                    <div class="input-group-custom" id="wrap-username">
                        <span class="input-icon"><i class="fas fa-user"></i></span>
                        <input type="text" id="inputUsername" placeholder="Username untuk login" autocomplete="username"
                            maxlength="100">
                    </div>
                </div>

                <!-- Tgl Lahir & Jenis Kelamin (2 kolom) -->
                <div class="form-row-2">
                    <div>
                        <label class="field-label">Tanggal Lahir</label>
                        <div class="input-group-custom" id="wrap-tgllahir">
                            <span class="input-icon"><i class="fas fa-calendar"></i></span>
                            <input type="date" id="inputTglLahir">
                        </div>
                    </div>
                    <div>
                        <label class="field-label">Jenis Kelamin</label>
                        <div class="input-group-custom input-group-select" id="wrap-jk">
                            <span class="input-icon"><i class="fas fa-venus-mars"></i></span>
                            <select id="inputJK">
                                <option value="">Pilih</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label class="field-label">Kata Sandi</label>
                    <div class="input-group-custom" id="wrap-password">
                        <span class="input-icon"><i class="fas fa-lock"></i></span>
                        <input type="password" id="inputPassword" placeholder="Minimal 6 karakter"
                            autocomplete="new-password" maxlength="100">
                        <button class="toggle-password" type="button" id="togglePass" aria-label="Tampilkan password">
                            <i class="fas fa-eye" id="pwIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Konfirmasi Password -->
                <div>
                    <label class="field-label">Konfirmasi Kata Sandi</label>
                    <div class="input-group-custom" id="wrap-konfirmasi">
                        <span class="input-icon"><i class="fas fa-lock"></i></span>
                        <input type="password" id="inputKonfirmasi" placeholder="Ulangi kata sandi"
                            autocomplete="new-password" maxlength="100">
                        <button class="toggle-password" type="button" id="toggleKonfirm"
                            aria-label="Tampilkan konfirmasi">
                            <i class="fas fa-eye" id="konfirmIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Tombol Daftar -->
                <button type="button" class="btn-login" id="btnDaftar" style="margin-top:4px">
                    <span id="btnText">Buat Akun Admin</span>
                    <span id="btnSpinner" style="display:none">
                        <span class="spinner-ring-sm"></span>
                    </span>
                    <i class="fas fa-arrow-right" id="btnArrow"></i>
                </button>

                <!-- Link ke login -->
                <p style="text-align:center;font-size:.85rem;color:#6b7280;margin-top:4px">
                    Sudah punya akun? <a href="login.html"
                        style="color:#009CFF;font-weight:600;text-decoration:none">Masuk di sini</a>
                </p>

            </div>

            <p class="card-footer-text">SIPENJA &mdash; Bengkel Any Jaya</p>
        </div>
    </div>

    <script src="js/registrasi-admin.js"></script>
</body>

</html>
